<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentMarketplace</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
    <div class="logo">
        🎓 CampusMart
    </div>

    <div class="search-box">
        <input type="text" placeholder="Search products...">
    </div>

    <div class="nav-links">
        <button class="login-btn">Login</button>
        <button class="sell-btn">Sell Item</button>
    </div>
</nav>
<section class="hero">

    <div class="hero-content">
        <h1>Buy & Sell With Students</h1>

        <p>
            A trusted marketplace for students to buy and sell
            books, notes, electronics, cycles and more.
        </p>

        <button class="hero-btn">
            Start Selling
        </button>
    </div>

    <div class="hero-image">
        <img src="https://placehold.co/500x300"
             alt="Student Marketplace">
    </div>
</section>
<section class="categories">

    <h2>Browse Categories</h2>

    <div class="category-container">

        <div class="category-card">
            <h3>📚 Books</h3>
        </div>

        <div class="category-card">
            <h3>📝 Notes</h3>
        </div>

        <div class="category-card">
            <h3>💻 Electronics</h3>
        </div>

        <div class="category-card">
            <h3>🪑 Furniture</h3>
        </div>

        <div class="category-card">
            <h3>🚲 Cycles</h3>
        </div>

        <div class="category-card">
            <h3>📦 Others</h3>
        </div>

    </div>

</section>
</body>
</html>
